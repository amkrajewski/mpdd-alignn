name: RuntimeTest

on: 
  push:
    branches: [main]
    paths:
      - 'alignn/**'
      - '.github/workflows/quickTest.yaml'
  
  pull_request:
    branches: [main]
    paths:
      - 'alignn/**'
      - '.github/workflows/quickTest.yaml'
  
  workflow_dispatch:

jobs:
  coreTest:
    timeout-minutes: 90
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          python -m pip install wheel flask pytest pytest-order pytest-cov
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu "torch==2.3.0+cpu" "torchvision==0.18.0+cpu" "torchdata==0.9.0"
          python -m pip install --no-deps 'dgl==2.2.0' -f https://data.dgl.ai/wheels/torch-2.3/repo.html
          python -m pip install -e .

      - name: Minimal runtime test
        run: python alignn/tests/test_readme_example.py